services:
  - type: web
    name: house-price-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python scripts/bootstrap_training_data.py && python scripts/train.py
    startCommand: uvicorn src.house_price_prediction.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: $PORT
      - key: DATABASE_URL
        value: sqlite:///data/processed/house_price_prediction.db
      - key: MODEL_PATH
        value: models/house_price_model.joblib
      - key: ENABLE_MOCK_PREDICTOR
        value: "true"
      - key: GEOCODING_PROVIDER
        value: free-fallback
      - key: PROPERTY_DATA_PROVIDER
        value: free-fallback
      - key: PREDICTION_REUSE_MAX_AGE_HOURS
        value: "24"

  - type: web
    name: house-price-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: API_BASE_URL
        value: https://housetoupredictapi.onrender.com
